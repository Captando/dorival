<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elitte Barbearia - Em Manutenção</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (Ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        gold: '#D4AF37',
                        goldHover: '#B5952F',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #09090b; /* zinc-950 */
            color: #ffffff;
            /* Fundo com leve textura ou gradiente escuro */
            background-image: radial-gradient(circle at top right, #18181b 0%, #09090b 50%);
        }
        .pulse-icon {
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { text-shadow: 0 0 10px rgba(212, 175, 55, 0.2); transform: scale(1); }
            50% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.6); transform: scale(1.05); }
            100% { text-shadow: 0 0 10px rgba(212, 175, 55, 0.2); transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Container Principal -->
    <div class="bg-zinc-900/80 border border-zinc-800 p-8 md:p-12 rounded-2xl shadow-2xl max-w-lg w-full text-center backdrop-blur-sm">
        
        <!-- Ícone / Logo -->
        <div class="text-gold text-5xl mb-6 flex justify-center pulse-icon">
            <i class="fa-solid fa-scissors"></i>
        </div>

        <!-- Título -->
        <h1 class="text-3xl font-bold tracking-tight mb-2">
            Elitte Barbearia
        </h1>
        
        <!-- Status -->
        <div class="inline-flex items-center gap-2 bg-zinc-800/50 text-gold px-4 py-1.5 rounded-full text-sm font-medium mb-6 border border-zinc-700/50">
            <span class="relative flex h-2.5 w-2.5">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-gold opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-gold"></span>
            </span>
            Site em Manutenção
        </div>

        <!-- Mensagem -->
        <p class="text-zinc-400 mb-8 leading-relaxed">
            Estamos melhorando nosso sistema de agendamentos para oferecer uma experiência ainda melhor para você. Voltaremos ao ar muito em breve!
        </p>

        <!-- Botões de Contato Alternativo -->
        <div class="flex flex-col gap-3">
            <!-- Instagram -->
            <a href="https://www.instagram.com/barbeariaaelitte/" target="_blank" 
               class="flex items-center justify-center gap-2 w-full bg-gold hover:bg-goldHover text-zinc-950 font-bold py-3.5 px-4 rounded-xl transition-all duration-300 transform hover:scale-[1.02]">
                <i class="fa-brands fa-instagram text-xl"></i>
                Acompanhe nosso Instagram
            </a>
        </div>
        
    </div>

</body>
</html>
